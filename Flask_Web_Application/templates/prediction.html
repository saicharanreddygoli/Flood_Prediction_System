<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Control Room | Flood Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Sleek dark blue/slate background */
            color: #f8fafc;
        }
        .navbar {
            background-color: #1e293b !important;
            border-bottom: 1px solid #334155;
        }
        .dashboard-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
        .form-label {
            color: #94a3b8;
            font-weight: 500;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            color: #fff;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }
        .btn-predict {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 14px;
            transition: all 0.2s;
        }
        .btn-predict:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        .card-header-custom {
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }
        .status-badge {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="/">
                <span class="me-2">⚡</span> FLOOD RADAR CONTROL
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-secondary" href="/">Home</a>
                <a class="nav-link active fw-semibold text-primary" href="/prediction">Predict Engine</a>
                <a class="nav-link text-secondary" href="/about">System Info</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="max-width: 600px;">
        <div class="dashboard-card p-4 p-md-5">
            
            <div class="card-header-custom text-center mb-4">
                <div class="mb-3">
                    <span class="status-badge fw-bold">System Status: Operational</span>
                </div>
                <h2 class="fw-bold text-white mb-1">Early Warning Input Panel</h2>
                <p class="text-muted small">Enter real-time meteorological metrics to calculate localized flood threats.</p>
            </div>

            <form action="/predict" method="POST">
                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>Annual Rainfall Metrics</span>
                        <span class="text-primary font-monospace">mm</span>
                    </label>
                    <input type="number" step="any" class="form-control" name="annual_rainfall" required placeholder="Ex: 2500">
                </div>

                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>Cloud Visibility Index</span>
                        <span class="text-primary font-monospace">1 - 10 Score</span>
                    </label>
                    <input type="number" step="any" class="form-control" name="cloud_visibility" required placeholder="Ex: 5.2">
                </div>

                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>Seasonal / Monsoon Rainfall</span>
                        <span class="text-primary font-monospace">mm</span>
                    </label>
                    <input type="number" step="any" class="form-control" name="seasonal_rainfall" required placeholder="Ex: 900">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-predict text-white fs-5 mt-2">
                    Run ML Risk Assessment
                </button>
            </form>

        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="text-secondary text-decoration-none small hover-link">← Return to Main Operations Center</a>
        </div>
    </div>

</body>
</html>
